# GitHub Actions workflow to build and deploy to GitHub Pages
#
# This workflow runs automatically when you push to the main branch.
#
# HOW TO ENABLE:
# 1. Go to your repository Settings > Pages
# 2. Under "Source", select "Deploy from a branch"
# 3. Select "gh-pages" branch
# 4. Push changes to the main branch
# 5. The workflow will build and deploy your site to https://<your-github-username>.github.io/<your-repository-name>/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll file
        run: touch build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build